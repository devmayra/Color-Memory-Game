<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Memory</title>
    <style>
        :root {
            --bg-main: #0f0f1a;
            --bg-card: #1a1a2e;
            --text-main: #ffffff;
            --text-sub: #aaaacc;
            --text-muted: #555577;
            --accent: #7755ff;
            --accent-hover: #9977ff;
            --font-main: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            --font-mono: 'Courier New', Courier, monospace;
        }
        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: var(--font-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        #app { width: 100%; max-width: 820px; }
        .hidden { display: none !important; }
        .header { display: flex; justify-content: space-between; margin-bottom: 20px; color: var(--text-muted); font-size: 14px; }
        h1 { font-size: 24px; margin: 10px 0 5px 0; text-align: center; }
        h2 { font-size: 16px; color: #9988ff; margin: 0 0 20px 0; text-align: center; font-weight: normal; }
        .color-zone { display: flex; justify-content: center; gap: 30px; margin-bottom: 24px; }
        .card { background-color: var(--bg-card); border-radius: 12px; padding: 16px; display: flex; flex-direction: column; align-items: center; width: 180px; }
        .card-label { font-size: 11px; color: var(--text-muted); margin-bottom: 10px; letter-spacing: 0.05em; }
        .image-box { width: 160px; height: 160px; background-color: #1a1a2e; border-radius: 8px; overflow: hidden; }
        .image-box img { width: 100%; height: 100%; object-fit: contain; }
        .preview-color { width: 160px; height: 160px; border: 2px solid #ffffff; border-radius: 8px; }
        .hex-label { font-family: var(--font-mono); font-weight: bold; font-size: 14px; color: #888899; margin-top: 10px; }
        .sliders-container { max-width: 560px; margin: 0 auto; }
        .slider-group { margin-bottom: 18px; }
        .slider-row { display: flex; align-items: center; margin-bottom: 4px; }
        .slider-label { width: 130px; font-weight: bold; color: var(--text-sub); font-size: 13px; }
        .slider-val { width: 40px; text-align: right; font-family: var(--font-mono); font-weight: bold; font-size: 13px; }
        input[type=range] { display: none; }
        .gradient-bar-wrap {
            display: flex;
            align-items: center;
            padding-left: 142px;
            padding-right: 52px;
        }
        .gradient-canvas { flex-grow: 1; height: 20px; border-radius: 4px; display: block; cursor: pointer; }
        .btn-container { text-align: center; margin-top: 24px; }
        button { background-color: var(--accent); color: white; border: none; padding: 12px 30px; font-size: 15px; font-weight: bold; border-radius: 8px; cursor: pointer; }
        button:hover { background-color: var(--accent-hover); }
        .result-score { text-align: center; font-size: 48px; font-weight: bold; margin-bottom: 24px; }
        .result-label { text-align: center; font-size: 16px; color: var(--text-sub); margin-bottom: 8px; }
        .res-card-label { font-size: 11px; color: var(--text-muted); margin-bottom: 8px; letter-spacing: 0.05em; }
        .res-hsb { font-size: 11px; color: var(--text-muted); margin-top: 6px; }
        .final-rank { text-align: center; font-size: 64px; font-weight: bold; margin: 8px 0; }
        .final-avg { text-align: center; font-size: 17px; margin-bottom: 24px; }
        .progress-bar-row { display: flex; align-items: center; margin-bottom: 8px; max-width: 420px; margin-left: auto; margin-right: auto; }
        .pb-round { width: 28px; color: var(--text-muted); font-size: 12px; }
        .pb-name { width: 120px; color: #888899; font-size: 12px; }
        .pb-bg { flex-grow: 1; background: var(--bg-card); height: 10px; border-radius: 5px; overflow: hidden; margin-right: 12px; }
        .pb-fill { height: 100%; border-radius: 5px; }
        .pb-score { width: 40px; font-family: var(--font-mono); font-size: 12px; text-align: right; }
    </style>
</head>
<body>
<div id="app">

    <!-- RONDA -->
    <div id="screen-round">
        <div class="header">
            <span id="round-counter">Ronda 1 / 5</span>
            <span id="score-history">Anteriores: —</span>
        </div>
        <h1 id="question-title">¿De qué color es...?</h1>
        <h2 id="character-name">«Nombre»</h2>
        <div class="color-zone">
            <div class="card">
                <div class="card-label">PERSONAJE</div>
                <div class="image-box"><img id="char-image" src="" alt="Personaje"></div>

            </div>
            <div class="card">
                <div class="card-label">TU SELECCIÓN</div>
                <div id="preview-box" class="preview-color"></div>
                <div id="hex-label" class="hex-label">#808080</div>
            </div>
        </div>
        <div class="sliders-container">
            <div class="slider-group">
                <div class="slider-row">
                    <div class="slider-label">Matiz (H)</div>
                    <input type="range" id="h-slider" min="0" max="360" value="180">
                    <div class="slider-val" id="h-val" style="color:#ff6666">180</div>
                </div>
                <div class="gradient-bar-wrap"><canvas id="grad-h" class="gradient-canvas" height="8"></canvas></div>
            </div>
            <div class="slider-group">
                <div class="slider-row">
                    <div class="slider-label">Saturación (S)</div>
                    <input type="range" id="s-slider" min="0" max="100" value="50">
                    <div class="slider-val" id="s-val" style="color:#66aaff">50</div>
                </div>
                <div class="gradient-bar-wrap"><canvas id="grad-s" class="gradient-canvas" height="8"></canvas></div>
            </div>
            <div class="slider-group">
                <div class="slider-row">
                    <div class="slider-label">Brillo (B)</div>
                    <input type="range" id="b-slider" min="0" max="100" value="50">
                    <div class="slider-val" id="b-val" style="color:#ffee66">50</div>
                </div>
                <div class="gradient-bar-wrap"><canvas id="grad-b" class="gradient-canvas" height="8"></canvas></div>
            </div>
        </div>
        <div class="btn-container"><button onclick="submitRound()">✓ Confirmar color</button></div>
    </div>

    <!-- RESULTADO -->
    <div id="screen-result" class="hidden">
        <div class="result-label" id="result-emoji-label">Puntuación de la ronda</div>
        <div class="result-score" id="result-points">0.00 / 10</div>
        <div class="color-zone">
            <div class="card">
                <div class="res-card-label">TU COLOR</div>
                <div id="res-user-color" class="preview-color"></div>
                <div id="res-user-hex" class="hex-label"></div>
                <div id="res-user-hsb" class="res-hsb"></div>
            </div>
            <div class="card">
                <div class="res-card-label">COLOR REAL</div>
                <div id="res-real-color" class="preview-color"></div>
                <div id="res-real-hex" class="hex-label"></div>
                <div id="res-real-hsb" class="res-hsb"></div>
            </div>
        </div>
        <h2 id="res-char-name">«Nombre»</h2>
        <div class="btn-container"><button id="btn-next-round" onclick="nextRound()">Siguiente ronda →</button></div>
    </div>

    <!-- FINAL -->
    <div id="screen-final" class="hidden">
        <h1 style="font-size:32px;margin-bottom:4px">🎨 Resultado Final</h1>
        <div class="final-rank" id="final-rank">S</div>
        <div class="final-avg" id="final-avg">Promedio: 0.00 / 10</div>
        <div id="final-bars"></div>
        <div class="btn-container"><button onclick="initGame()">🔄 Jugar de nuevo</button></div>
    </div>

</div>
<script>
const CHALLENGES_DATA = [
    { name:"Tinkerbell",   part:"vestido",            image:"assets/campanita.png",    h:129, s:47,  b:46  },
    { name:"SpongeBob",    part:"cuerpo",             image:"assets/bobesponja.png",   h:59,  s:76,  b:100 },
    { name:"Bart Simpson", part:"short",              image:"assets/bartsimpson.png",  h:196, s:100, b:87  },
    { name:"Garfield",     part:"pelaje",             image:"assets/garfield.png",     h:38,  s:91,  b:100 },
    { name:"Kirby",        part:"zapato",             image:"assets/kirby.png",        h:344, s:100, b:72  },
    { name:"Sonic",        part:"pelaje",             image:"assets/sonic.png",        h:227, s:86,  b:98  },
    { name:"Marceline",    part:"bajo (centro)",      image:"assets/marceline.png",    h:358, s:98,  b:58  },
    { name:"Mordecai",     part:"plumaje",            image:"assets/mordecai.png",     h:221, s:35,  b:83  },
    { name:"Rigby",        part:"pecho",              image:"assets/rigby.png",        h:31,  s:18,  b:75  },
    { name:"Gumball",      part:"pelaje",             image:"assets/gumball.png",      h:198, s:77,  b:100 },
    { name:"Pink Panther", part:"ojo",                image:"assets/panterarosa.png",  h:56,  s:100, b:100 },
    { name:"Remy",         part:"pelaje",             image:"assets/remy.png",         h:180, s:12,  b:41  },
    { name:"Hinata",       part:"pelo",               image:"assets/hinata.png",       h:23,  s:71,  b:100 },
    { name:"Tendou",       part:"número de camiseta", image:"assets/tendou.png",       h:327, s:43,  b:59  },
    { name:"Kitty",        part:"moño",               image:"assets/kitty.png",        h:344, s:92,  b:91  },
    { name:"Kuromi",       part:"gorro",              image:"assets/kuromi.png",       h:40,  s:3,   b:36  },
    { name:"Melody",       part:"gorro",              image:"assets/mymelody.png",     h:348, s:45,  b:95  },
    { name:"Purple Guy",   part:"cuerpo",             image:"assets/hombremorado.png", h:269, s:50,  b:58  },
    { name:"Mangle",       part:"pecho",              image:"assets/mangle.png",       h:352, s:55,  b:100 },
    { name:"Cupcake",      part:"fuego",              image:"assets/cupcake.png",      h:42,  s:100, b:100 },
];

let roundNum = 0, scores = [], currentChallenges = [];
const hSlider = document.getElementById('h-slider');
const sSlider = document.getElementById('s-slider');
const bSlider = document.getElementById('b-slider');
const gradH   = document.getElementById('grad-h');
const gradS   = document.getElementById('grad-s');
const gradB   = document.getElementById('grad-b');

function hsbToRgb(h, s, v) {
    h/=360; s/=100; v/=100;
    let r,g,b;
    const i=Math.floor(h*6), f=h*6-i, p=v*(1-s), q=v*(1-f*s), t=v*(1-(1-f)*s);
    switch(i%6){case 0:r=v,g=t,b=p;break;case 1:r=q,g=v,b=p;break;case 2:r=p,g=v,b=t;break;case 3:r=p,g=q,b=v;break;case 4:r=t,g=p,b=v;break;case 5:r=v,g=p,b=q;break;}
    return [Math.round(r*255),Math.round(g*255),Math.round(b*255)];
}
function hsbToHex(h,s,b){ const[r,g,bl]=hsbToRgb(h,s,b); return '#'+[r,g,bl].map(x=>x.toString(16).padStart(2,'0')).join(''); }
function scoreColors(h1,s1,b1,h2,s2,b2){
    const dh=Math.min(Math.abs(h1-h2),360-Math.abs(h1-h2))/180, ds=Math.abs(s1-s2)/100, db=Math.abs(b1-b2)/100;
    const dist=Math.sqrt((dh*.6)**2+(ds*.25)**2+(db*.15)**2);
    return Math.round(10*((1-dist/Math.sqrt(.6**2+.25**2+.15**2))**1.8)*100)/100;
}

function drawGradient(canvas, type) {
    const w = canvas.parentElement.offsetWidth - 0;
    if (w <= 0) return;
    canvas.width = w; canvas.height = 20;
    const ctx = canvas.getContext('2d');
    const H=parseInt(hSlider.value), S=parseInt(sSlider.value), B=parseInt(bSlider.value);

    for (let i=0; i<w; i++) {
        const pct = i/w;
        let hex;
        if      (type==='h') hex = hsbToHex(pct*360, Math.max(S,50), Math.max(B,50));
        else if (type==='s') hex = hsbToHex(H, pct*100, Math.max(B,50));
        else                  hex = hsbToHex(H, Math.max(S,50), pct*100);
        ctx.fillStyle = hex;
        ctx.fillRect(i, 4, 1, 12);
    }

    // marcador: cuadrado con el color exacto de esa posición
    const pct = type==='h' ? H/360 : type==='s' ? S/100 : B/100;
    let markerHex;
    if      (type==='h') markerHex = hsbToHex(H, Math.max(S,50), Math.max(B,50));
    else if (type==='s') markerHex = hsbToHex(H, S, Math.max(B,50));
    else                  markerHex = hsbToHex(H, Math.max(S,50), B);
    const mx = Math.round(pct * w);
    ctx.save();
    ctx.fillStyle = markerHex;
    ctx.fillRect(mx-7, 0, 14, 20);
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 2;
    ctx.strokeRect(mx-7, 0, 14, 20);
    ctx.restore();
}

function drawAllGradients() {
    drawGradient(gradH,'h');
    drawGradient(gradS,'s');
    drawGradient(gradB,'b');
}

function updatePreview() {
    const h=parseInt(hSlider.value), s=parseInt(sSlider.value), b=parseInt(bSlider.value);
    const hex = hsbToHex(h,s,b);
    document.getElementById('preview-box').style.backgroundColor = hex;
    document.getElementById('hex-label').innerText = hex.toUpperCase();
    document.getElementById('h-val').innerText = h;
    document.getElementById('s-val').innerText = s;
    document.getElementById('b-val').innerText = b;
    drawAllGradients();
}

[hSlider,sSlider,bSlider].forEach(s=>s.addEventListener('input', updatePreview));

// hacer los canvas arrastrables
function setupCanvasDrag(canvas, slider) {
    function handleMove(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const pct = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
        slider.value = Math.round(pct * parseInt(slider.max));
        updatePreview();
    }
    canvas.addEventListener('mousedown',  e => { handleMove(e); canvas.dataset.dragging = '1'; });
    canvas.addEventListener('touchstart', e => { handleMove(e); e.preventDefault(); }, { passive: false });
    window.addEventListener('mousemove',  e => { if (canvas.dataset.dragging) handleMove(e); });
    window.addEventListener('mouseup',    () => { delete canvas.dataset.dragging; });
    canvas.addEventListener('touchmove',  e => { handleMove(e); e.preventDefault(); }, { passive: false });
}

function shuffle(a){return[...a].sort(()=>Math.random()-.5);}

function initGame(){
    scores=[]; roundNum=0;
    currentChallenges=shuffle(CHALLENGES_DATA).slice(0,5);
    setupCanvasDrag(gradH, hSlider);
    setupCanvasDrag(gradS, sSlider);
    setupCanvasDrag(gradB, bSlider);
    startRound();
}

function startRound(){
    document.getElementById('screen-round').classList.remove('hidden');
    document.getElementById('screen-result').classList.add('hidden');
    document.getElementById('screen-final').classList.add('hidden');
    const ch=currentChallenges[roundNum];
    document.getElementById('question-title').innerText=`¿De qué color es el ${ch.part} de ${ch.name}?`;
    document.getElementById('character-name').innerText=`«${ch.name}»`;
    document.getElementById('char-image').src=ch.image;
    document.getElementById('round-counter').innerText=`Ronda ${roundNum+1} / 5`;
    document.getElementById('score-history').innerText=scores.length
        ?'Anteriores: '+scores.map(s=>s.toFixed(1)).join('  ·  ')
        :'Anteriores: —';
    hSlider.value=180; sSlider.value=50; bSlider.value=50;
    updatePreview();
    requestAnimationFrame(drawAllGradients);
}

function submitRound(){
    const ch=currentChallenges[roundNum];
    const h=parseInt(hSlider.value), s=parseInt(sSlider.value), b=parseInt(bSlider.value);
    const pts=scoreColors(h,s,b,ch.h,ch.s,ch.b);
    scores.push(pts);
    const hexUser=hsbToHex(h,s,b), hexReal=hsbToHex(ch.h,ch.s,ch.b);
    const scoreColor=pts>=8?'#44dd88':pts>=5?'#ffcc44':'#ff6655';
    const emoji=pts>=8?'🎯':pts>=5?'👀':'😅';
    document.getElementById('screen-round').classList.add('hidden');
    document.getElementById('screen-result').classList.remove('hidden');
    document.getElementById('result-emoji-label').innerText=`${emoji}  Puntuación de la ronda`;
    document.getElementById('result-points').innerText=`${pts} / 10`;
    document.getElementById('result-points').style.color=scoreColor;
    document.getElementById('res-user-color').style.backgroundColor=hexUser;
    document.getElementById('res-user-hex').innerText=hexUser.toUpperCase();
    document.getElementById('res-user-hsb').innerText=`H${h}  S${s}  B${b}`;
    document.getElementById('res-real-color').style.backgroundColor=hexReal;
    document.getElementById('res-real-hex').innerText=hexReal.toUpperCase();
    document.getElementById('res-real-hsb').innerText=`H${ch.h}  S${ch.s}  B${ch.b}`;
    document.getElementById('res-char-name').innerText=`«${ch.name}»`;
    document.getElementById('btn-next-round').innerText=
        roundNum+1<5?`Siguiente ronda → (${roundNum+2}/5)`:'Ver resultado final 🏆';
}

function nextRound(){roundNum++; roundNum<5?startRound():showFinal();}

function showFinal(){
    document.getElementById('screen-result').classList.add('hidden');
    document.getElementById('screen-final').classList.remove('hidden');
    const avg=scores.reduce((a,b)=>a+b,0)/5;
    const [rank,color,msg]=
        avg>=8.5?['S','#ffd700','¡Memoria de color perfecta!']:
        avg>=7  ?['A','#44dd88','¡Excelente!']:
        avg>=5  ?['B','#66aaff','Buen ojo']:
        avg>=3  ?['C','#ffcc44','Sigue practicando']:
                 ['D','#ff6655','¡La práctica hace al maestro!'];
    document.getElementById('final-rank').innerText=rank;
    document.getElementById('final-rank').style.color=color;
    document.getElementById('final-avg').innerText=`Promedio: ${avg.toFixed(2)} / 10 — ${msg}`;
    document.getElementById('final-avg').style.color=color;
    const barsDiv=document.getElementById('final-bars');
    barsDiv.innerHTML='';
    currentChallenges.forEach((ch,i)=>{
        const sc=scores[i], clr=sc>=8?'#44dd88':sc>=5?'#ffcc44':'#ff6655';
        barsDiv.innerHTML+=`
        <div class="progress-bar-row">
            <div class="pb-round">R${i+1}</div>
            <div class="pb-name">${ch.name}</div>
            <div class="pb-bg"><div class="pb-fill" style="width:${Math.round(sc/10*100)}%;background:${clr}"></div></div>
            <div class="pb-score" style="color:${clr}">${sc.toFixed(2)}</div>
        </div>`;
    });
}

window.onload=initGame;
window.addEventListener('resize', drawAllGradients);
</script>
</body>
</html>
