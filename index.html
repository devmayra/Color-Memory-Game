<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Memory</title>
    <style>
        :root {
            --bg-main: #0f0f1a;
            --bg-card: #1a1a2e;
            --text-main: #ffffff;
            --text-sub: #aaaacc;
            --text-muted: #555577;
            --accent: #7755ff;
            --accent-hover: #9977ff;
            --font-main: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            --font-mono: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: var(--font-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #app { width: 100%; max-width: 820px; background-color: var(--bg-main); }
        .hidden { display: none !important; }
        .header { display: flex; justify-content: space-between; margin-bottom: 20px; color: var(--text-muted); font-size: 14px; }
        h1 { font-size: 26px; margin: 10px 0 5px 0; text-align: center; }
        h2 { font-size: 16px; color: #9988ff; margin: 0 0 20px 0; text-align: center; font-weight: normal; }
        .color-zone { display: flex; justify-content: center; gap: 30px; margin-bottom: 30px; }
        .card { background-color: var(--bg-card); border-radius: 12px; padding: 25px; display: flex; flex-direction: column; align-items: center; width: 200px; }
        .image-box { width: 160px; height: 160px; background-color: #1a1a2e; display: flex; justify-content: center; align-items: center; border-radius: 8px; overflow: hidden; position: relative; }
        .image-box img { width: 100%; height: 100%; object-fit: contain; }
        .preview-color { width: 160px; height: 160px; border: 2px solid #ffffff; border-radius: 8px; margin-bottom: 15px; }
        .hex-label { font-family: var(--font-mono); font-weight: bold; font-size: 16px; color: #888899; }
        .sliders-container { max-width: 550px; margin: 0 auto; }
        .slider-row { display: flex; align-items: center; margin-bottom: 20px; }
        .slider-label { width: 120px; font-weight: bold; color: var(--text-sub); }
        .slider-val { width: 50px; text-align: right; font-family: var(--font-mono); font-weight: bold; }
        input[type=range] { -webkit-appearance: none; flex-grow: 1; height: 12px; border-radius: 6px; background: #2a2a3e; outline: none; margin: 0 15px; cursor: pointer; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 20px; height: 24px; border-radius: 4px; border: 2px solid #ffffff; cursor: pointer; background: var(--thumb-color, #ffffff); }
        .btn-container { text-align: center; margin-top: 30px; }
        button { background-color: var(--accent); color: white; border: none; padding: 12px 30px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; }
        button:hover { background-color: var(--accent-hover); }
        .progress-bar-row { display: flex; align-items: center; margin-bottom: 10px; max-width: 400px; margin-left: auto; margin-right: auto; }
        .pb-name { width: 120px; color: #888899; font-size: 12px; }
        .pb-bg { flex-grow: 1; background: var(--bg-card); height: 10px; border-radius: 5px; overflow: hidden; margin-right: 15px; }
        .pb-fill { height: 100%; border-radius: 5px; }
    </style>
</head>
<body>
    <div id="app">
        <div id="screen-round">
            <div class="header">
                <span id="round-counter">Ronda 1 / 5</span>
                <span id="score-history">Anteriores: —</span>
            </div>
            <h1 id="question-title">¿De qué color es...?</h1>
            <h2 id="character-name">«Nombre»</h2>
            <div class="color-zone">
                <div class="card"><div class="image-box"><img id="char-image" src="" alt="Personaje"></div></div>
                <div class="card"><div id="preview-box" class="preview-color"></div><div id="hex-label" class="hex-label">#808080</div></div>
            </div>
            <div class="sliders-container">
                <div class="slider-row"><div class="slider-label">Matiz (H)</div><input type="range" id="h-slider" min="0" max="360" value="180"><div class="slider-val" id="h-val">180</div></div>
                <div class="slider-row"><div class="slider-label">Saturación (S)</div><input type="range" id="s-slider" min="0" max="100" value="50"><div class="slider-val" id="s-val">50</div></div>
                <div class="slider-row"><div class="slider-label">Brillo (B)</div><input type="range" id="b-slider" min="0" max="100" value="50"><div class="slider-val" id="b-val">50</div></div>
            </div>
            <div class="btn-container"><button onclick="submitRound()">Confirmar color</button></div>
        </div>
        <div id="screen-result" class="hidden">
            <h2 style="font-size: 24px; margin-bottom: 30px;">Puntuación de la ronda</h2>
            <div style="text-align: center; font-size: 48px; font-weight: bold; margin-bottom: 30px;" id="result-points">0.00 / 10</div>
            <div class="color-zone">
                <div class="card">
                    <div id="res-user-color" class="preview-color"></div>
                    <div id="res-user-hex" class="hex-label">#000000</div>
                </div>
                <div class="card">
                    <div id="res-real-color" class="preview-color"></div>
                    <div id="res-real-hex" class="hex-label">#000000</div>
                </div>
            </div>
            <h2 id="res-char-name">«Nombre»</h2>
            <div class="btn-container"><button id="btn-next-round" onclick="nextRound()">Siguiente ronda</button></div>
        </div>
        <div id="screen-final" class="hidden">
            <h1 style="font-size: 36px; margin-bottom: 20px;">Resultado Final</h1>
            <div style="text-align: center; font-size: 60px; font-weight: bold;" id="final-rank">S</div>
            <div style="text-align: center; font-size: 18px; margin-top: 10px;" id="final-avg">Promedio: 0.00 / 10</div>
            <div id="final-bars" style="margin-top: 30px;"></div>
            <div class="btn-container"><button onclick="initGame()">Jugar de nuevo</button></div>
        </div>
    </div>
    <script>
        const CHALLENGES_DATA = [
            { name: "Tinkerbell", part: "vestido", image: "assets/campanita.png", h: 129, s: 47, b: 46 },
            { name: "SpongeBob", part: "cuerpo", image: "assets/bobesponja.png", h: 59, s: 76, b: 100 },
            { name: "Bart Simpson", part: "short", image: "assets/bartsimpson.png", h: 196, s: 100, b: 87 },
            { name: "Garfield", part: "pelaje", image: "assets/garfield.png", h: 38, s: 91, b: 100 },
            { name: "Kirby", part: "zapato", image: "assets/kirby.png", h: 344, s: 100, b: 72 },
            { name: "Sonic", part: "pelaje", image: "assets/sonic.png", h: 227, s: 86, b: 98 },
            { name: "Marceline", part: "bajo (centro)", image: "assets/marceline.png", h: 358, s: 98, b: 58 },
            { name: "Mordecai", part: "plumaje", image: "assets/mordecai.png", h: 221, s: 35, b: 83 },
            { name: "Rigby", part: "pecho", image: "assets/rigby.png", h: 31, s: 18, b: 75 },
            { name: "Gumball", part: "pelaje", image: "assets/gumball.png", h: 198, s: 77, b: 100 },
            { name: "Pink Panther", part: "ojo", image: "assets/panterarosa.png", h: 56, s: 100, b: 100 },
            { name: "Remy", part: "pelaje", image: "assets/remy.png", h: 180, s: 12, b: 41 },
            { name: "Hinata", part: "pelo", image: "assets/hinata.png", h: 23, s: 71, b: 100 },
            { name: "Tendou", part: "número de camiseta", image: "assets/tendou.png", h: 327, s: 43, b: 59 },
            { name: "Kitty", part: "moño", image: "assets/kitty.png", h: 344, s: 92, b: 91 },
            { name: "Kuromi", part: "gorro", image: "assets/kuromi.png", h: 40, s: 3, b: 36 },
            { name: "Melody", part: "gorro", image: "assets/mymelody.png", h: 348, s: 45, b: 95 },
            { name: "Purple Guy", part: "cuerpo", image: "assets/hombremorado.png", h: 269, s: 50, b: 58 },
            { name: "Mangle", part: "pecho", image: "assets/mangle.png", h: 352, s: 55, b: 100 },
            { name: "Cupcake", part: "fuego", image: "assets/cupcake.png", h: 42, s: 100, b: 100 }
        ];
        
        let roundNum = 0, scores = [], currentChallenges = [];
        const hSlider = document.getElementById('h-slider'), sSlider = document.getElementById('s-slider'), bSlider = document.getElementById('b-slider');
        
        function shuffle(a) { return a.sort(() => Math.random() - 0.5); }
        function hsbToHex(h, s, v) {
            h /= 360; s /= 100; v /= 100;
            let r, g, b;
            let i = Math.floor(h * 6), f = h * 6 - i, p = v * (1 - s), q = v * (1 - f * s), t = v * (1 - (1 - f) * s);
            switch (i % 6) { case 0: r=v, g=t, b=p; break; case 1: r=q, g=v, b=p; break; case 2: r=p, g=v, b=t; break; case 3: r=p, g=q, b=v; break; case 4: r=t, g=p, b=v; break; case 5: r=v, g=p, b=q; break; }
            return "#" + [r, g, b].map(x => Math.round(x * 255).toString(16).padStart(2, '0')).join('');
        }
        function scoreColors(h1, s1, b1, h2, s2, b2) {
            let dh = Math.min(Math.abs(h1 - h2), 360 - Math.abs(h1 - h2)) / 180, ds = Math.abs(s1 - s2) / 100, db = Math.abs(b1 - b2) / 100;
            let dist = Math.sqrt((dh*0.6)**2 + (ds*0.25)**2 + (db*0.15)**2);
            return Math.round(10 * (1 - dist / Math.sqrt(0.6**2 + 0.25**2 + 0.15**2))**1.8 * 100) / 100;
        }
        function updateSliders() {
            let h=hSlider.value, s=sSlider.value, b=bSlider.value;
            let hex = hsbToHex(h, s, b);
            document.getElementById('preview-box').style.backgroundColor = hex;
            document.getElementById('hex-label').innerText = hex.toUpperCase();
            document.getElementById('h-val').innerText = h; document.getElementById('s-val').innerText = s; document.getElementById('b-val').innerText = b;
        }
        function initGame() {
            scores = []; roundNum = 0; currentChallenges = shuffle([...CHALLENGES_DATA]).slice(0, 5); startRound();
        }
        function startRound() {
            document.getElementById('screen-round').classList.remove('hidden'); document.getElementById('screen-result').classList.add('hidden'); document.getElementById('screen-final').classList.add('hidden');
            const ch = currentChallenges[roundNum];
            document.getElementById('question-title').innerText = `¿De qué color es el ${ch.part} de ${ch.name}?`;
            document.getElementById('character-name').innerText = `«${ch.name}»`;
            document.getElementById('char-image').src = ch.image;
            updateSliders();
        }
        [hSlider, sSlider, bSlider].forEach(s => s.addEventListener('input', updateSliders));
        function submitRound() {
            const ch = currentChallenges[roundNum];
            let pts = scoreColors(parseInt(hSlider.value), parseInt(sSlider.value), parseInt(bSlider.value), ch.h, ch.s, ch.b);
            scores.push(pts);
            document.getElementById('screen-round').classList.add('hidden'); document.getElementById('screen-result').classList.remove('hidden');
            document.getElementById('result-points').innerText = `${pts} / 10`;
            document.getElementById('res-user-color').style.backgroundColor = hsbToHex(hSlider.value, sSlider.value, bSlider.value);
            document.getElementById('res-real-color').style.backgroundColor = hsbToHex(ch.h, ch.s, ch.b);
            document.getElementById('res-char-name').innerText = `«${ch.name}»`;
        }
        function nextRound() { roundNum++; roundNum < 5 ? startRound() : showFinal(); }
        function showFinal() {
            document.getElementById('screen-result').classList.add('hidden'); document.getElementById('screen-final').classList.remove('hidden');
            let avg = scores.reduce((a,b) => a+b, 0) / 5;
            document.getElementById('final-avg').innerText = `Promedio: ${avg.toFixed(2)} / 10`;
        }
        window.onload = initGame;
    </script>
</body>
</html>
